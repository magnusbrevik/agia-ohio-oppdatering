name: Oppdater AIS-ruten

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agia-ohio-ais-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Be nettstedet hente siste AIS-posisjon
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --max-time 85 \
            --request POST \
            "https://agia-ohio-reisen.magnuus.chatgpt.site/api/tracking/refresh" \
            --output response.json
          jq -e '.mmsi == "257061840"' response.json >/dev/null

      - name: Hold den planlagte jobben aktiv
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          heartbeat=".github/heartbeat"
          now="$(date -u +%s)"
          last=0
          if [[ -f "$heartbeat" ]]; then
            saved="$(cat "$heartbeat")"
            last="$(date -u -d "$saved" +%s 2>/dev/null || echo 0)"
          fi
          if (( now - last < 2592000 )); then
            exit 0
          fi
          date -u +%FT%TZ > "$heartbeat"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$heartbeat"
          git commit -m "chore: hold AIS schedule active"
          git push
